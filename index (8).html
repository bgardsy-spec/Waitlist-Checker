  function pip(pt,poly){
    var x=pt[0],y=pt[1],inside=false;
    for(var i=0,j=poly.length-1;i<poly.length;j=i++){
      var xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
      if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)inside=!inside;
    }
    return inside;
  }

  function isExcluded(name){
    var low=name.toLowerCase();
    for(var i=0;i<EXCL.length;i++) if(low.indexOf(EXCL[i])!==-1) return true;
    return false;
  }

  function showIneligible(box){
    box.className='status ineligible';
    box.innerHTML=
      '<div class="status-header"><div class="status-icon">&#128683;</div><div class="status-title">Outside Jurisdiction</div></div>'+
      '<div class="status-body">Your address is <strong>not within Local 120\'s jurisdiction</strong>. You must currently reside within our jurisdiction to be eligible.<br><br>'+
      '<strong>Moving to the area does not qualify.</strong> Current residency is required at the time of application.</div>'+
      '<button class="btn-exit" onclick="window.close()">EXIT</button>';
  }

  window.checkAddress=function(){
    var raw=document.getElementById('addressInput').value.trim();
    var btn=document.getElementById('checkBtn');
    var box=document.getElementById('statusBox');

    if(!raw){ document.getElementById('addressInput').focus(); return; }

    // Check raw input against exclusion list first -- catches places Nominatim cannot find
    if(isExcluded(raw)){ showIneligible(box); return; }

    var q=raw;
    if(!/ontario|,\s*on\b|canada/i.test(q)) q+=', Ontario, Canada';

    btn.disabled=true;
    box.className='status checking';
    box.innerHTML='<span class="spinner"></span> Checking your address...';

    fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q)+'&countrycodes=ca',
      {headers:{'Accept-Language':'en','User-Agent':'LU120/1.0'}})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||!data.length){
        box.className='status error';
        box.innerHTML='<strong>Address not found.</strong><br>Please include your full address with city and postal code. If the problem continues, contact the Training Centre at (519) 453-3330.';
        return;
      }
      var lat=parseFloat(data[0].lat),lng=parseFloat(data[0].lon),name=data[0].display_name;
      var eligible=pip([lng,lat],POLY)&&!isExcluded(name);

      if(eligible){
        box.className='status eligible';
        box.innerHTML=
          '<div class="status-header"><div class="status-icon">&#9989;</div><div class="status-title">Within Jurisdiction</div></div>'+
          '<div class="status-body">Your address is within <strong>Local 120\'s jurisdiction</strong>. You are eligible to join our apprenticeship waitlist.</div>'+
          '<a class="btn-proceed" href="'+WAITLIST_URL+'" target="_blank">JOIN THE WAITLIST &#8594;</a>'+
          '<div class="status-note">Note: When applications open, you will complete a second address verification at that time to confirm your residency. Current residency within the jurisdiction is required at the time of application.</div>';
      } else {
        showIneligible(box);
      }
    })
    .catch(function(){
      box.className='status error';
      box.innerHTML='<strong>Something went wrong.</strong><br>Please check your internet connection and try again.';
    })
    .finally(function(){btn.disabled=false;});
  };

  document.getElementById('addressInput').addEventListener('keydown',function(e){
    if(e.key==='Enter') checkAddress();
  });
